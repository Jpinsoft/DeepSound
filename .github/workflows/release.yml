name: Build & Release macOS DMG

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [osx-arm64, osx-x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish app
        run: |
          dotnet publish src/DeepSoundMac.App/DeepSoundMac.App.csproj \
            -c Release \
            -r ${{ matrix.arch }} \
            --self-contained \
            -p:Version=${{ steps.version.outputs.version }} \
            -o publish/output

      - name: Create app bundle
        run: |
          set -e
          mkdir -p publish/DeepSound.app/Contents/MacOS
          mkdir -p publish/DeepSound.app/Contents/Resources
          cp -r publish/output/* publish/DeepSound.app/Contents/MacOS/
          chmod +x publish/DeepSound.app/Contents/MacOS/DeepSoundMac.App

          cat > publish/DeepSound.app/Contents/Info.plist << 'PLIST_EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>DeepSoundMac.App</string>
    <key>CFBundleIdentifier</key>
    <string>com.meamcat.deepsound</string>
    <key>CFBundleName</key>
    <string>DeepSound</string>
    <key>CFBundleDisplayName</key>
    <string>DeepSound</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>${{ steps.version.outputs.version }}</string>
    <key>CFBundleVersion</key>
    <string>${{ steps.version.outputs.version }}</string>
    <key>NSHighResolutionCapable</key>
    <true/>
    <key>LSMinimumSystemVersion</key>
    <string>12.0</string>
</dict>
</plist>
PLIST_EOF

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          set -e
          ARCH_LABEL="${{ matrix.arch }}"
          ARCH_LABEL="${ARCH_LABEL#osx-}"  # strip "osx-" -> arm64 or x64
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="DeepSound-${VERSION}-${ARCH_LABEL}.dmg"

          # create-dmg exits 2 if Finder cosmetics fail in headless CI — the DMG is still valid
          create-dmg \
            --volname "DeepSound ${VERSION}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "DeepSound.app" 175 190 \
            --hide-extension "DeepSound.app" \
            --app-drop-link 425 190 \
            "${DMG_NAME}" \
            "publish/" || { code=$?; [ $code -eq 2 ] || exit $code; }

          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          generate_release_notes: true
          files: ${{ env.DMG_NAME }}
