name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and test .NET solution
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore dependencies
        run: dotnet restore DeepSoundMac.sln
      
      - name: Build
        run: dotnet build DeepSoundMac.sln --configuration Release --no-restore
      
      - name: Test
        run: dotnet test DeepSoundMac.sln --configuration Release --no-build --verbosity normal
      
      - name: Publish for macOS ARM64 (Apple Silicon)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish src/DeepSoundMac.App/DeepSoundMac.App.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained \
            -o publish/osx-arm64
      
      - name: Publish for macOS x64 (Intel)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish src/DeepSoundMac.App/DeepSoundMac.App.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained \
            -o publish/osx-x64
      
      - name: Create ZIP archives
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd publish/osx-arm64
          zip -r ../../DeepSoundMac-macOS-arm64.zip .
          cd ../osx-x64
          zip -r ../../DeepSoundMac-macOS-x64.zip .
          cd ../..
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            DeepSoundMac-macOS-arm64.zip
            DeepSoundMac-macOS-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
