name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and test .NET solution
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore dependencies
        run: dotnet restore DeepSoundMac.sln
      
      - name: Build
        run: dotnet build DeepSoundMac.sln --configuration Release --no-restore
      
      - name: Test
        run: dotnet test DeepSoundMac.sln --configuration Release --no-build --verbosity normal
