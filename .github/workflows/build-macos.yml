name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyze default scheme using xcodebuild command
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Default Scheme
        id: set-scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo "$scheme_list" | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          if [ -z "$default" ]; then
            echo "Error: No default scheme found"
            exit 1
          fi
          echo "scheme=$default" >> $GITHUB_OUTPUT
          echo Using default scheme: "$default"
      - name: Build
        env:
          scheme: ${{ steps.set-scheme.outputs.scheme }}
        run: |
          # Detect workspace or project file
          workspace_file=$(ls -A | grep -i '\.xcworkspace$' || true)
          project_file=$(ls -A | grep -i '\.xcodeproj$' || true)
          
          if [ -n "$workspace_file" ]; then
            filetype_parameter="workspace"
            file_to_build="$workspace_file"
          elif [ -n "$project_file" ]; then
            filetype_parameter="project"
            file_to_build="$project_file"
          else
            echo "Error: No Xcode workspace or project file found"
            exit 1
          fi
          
          file_to_build=$(echo "$file_to_build" | awk '{$1=$1;print}')
          
          # Check if xcpretty is available, otherwise use plain output
          if command -v xcpretty &> /dev/null; then
            xcodebuild clean build analyze -scheme "$scheme" -"$filetype_parameter" "$file_to_build" | xcpretty && exit ${PIPESTATUS[0]}
          else
            xcodebuild clean build analyze -scheme "$scheme" -"$filetype_parameter" "$file_to_build"
          fi
